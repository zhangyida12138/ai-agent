# HTTP → HTTPS 跳转
server {
    listen 80;
    listen [::]:80;
    server_name notgonnalieplz.site www.notgonnalieplz.site;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name notgonnalieplz.site www.notgonnalieplz.site;

    client_max_body_size 32m;

    ssl_certificate     /etc/nginx/notgonnalieplz.site_bundle.crt;
    ssl_certificate_key /etc/nginx/notgonnalieplz.site.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root  /home/ubuntu/ai-agent/apps/desktop/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
