# Nginx 示例：反代 Sidecar + 静态前端
# 用法：sudo cp deploy/nginx-notgonnalieplz.site.conf /etc/nginx/sites-available/ai-agent
#       sudo ln -sf /etc/nginx/sites-available/ai-agent /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# 当前：HTTP + default_server，便于用 http://服务器IP/ 访问。
# 恢复域名 HTTPS：取消下方「HTTPS 443」整段注释，并注释或删掉本文件末尾「HTTP 80 IP 访问」块，
# 同时把 80 端域名 server 的 return 301 取消注释以强制跳转 HTTPS。

# --- HTTP：优先 IP / 任意 Host（调试）---
server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  client_max_body_size 32m;

  root /etc/ai-agent/apps/desktop/dist;
  index index.html;

  location /api/ {
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

