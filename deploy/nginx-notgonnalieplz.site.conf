# Nginx 示例：HTTPS 静态前端 + 同域反代 Sidecar
# 用法：sudo cp deploy/nginx-notgonnalieplz.site.conf /etc/nginx/sites-available/ai-agent
#       sudo ln -sf /etc/nginx/sites-available/ai-agent /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# 部署前请修改：
# - server_name、证书路径、root（当前证书为 /etc/nginx/ 下自建 bundle）
# - root 为桌面构建产物目录（pnpm build 后 apps/desktop/dist 的内容所在路径）

# 静态根目录（按服务器实际路径二选一或自建目录）
# 例：/var/www/ai-agent/desktop   或   /home/ubuntu/ai-agent/apps/desktop/dist

# --- HTTPS：正式域名 ---
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name notgonnalieplz.site www.notgonnalieplz.site;

  client_max_body_size 32m;

  ssl_certificate     /etc/nginx/notgonnalieplz.site_bundle.crt;
  ssl_certificate_key /etc/nginx/notgonnalieplz.site.key;

  root /etc/ai-agent/apps/desktop/dist;
  index index.html;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location /api/ {
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

# --- HTTP：域名强制跳转 HTTPS ---
server {
  listen 80;
  listen [::]:80;
  server_name notgonnalieplz.site www.notgonnalieplz.site;
  return 301 https://$host$request_uri;
}

# --- HTTP：可选 default_server（仅用 IP 调试时启用；与上面 80 域名块不要重复 default_server）---
