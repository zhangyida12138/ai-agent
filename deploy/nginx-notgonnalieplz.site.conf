# Nginx 示例：HTTPS 同域反代 Sidecar（路径与证书请按服务器实际修改）
# 用法：sudo cp deploy/nginx-notgonnalieplz.site.conf /etc/nginx/sites-available/ai-agent
#       sudo ln -sf /etc/nginx/sites-available/ai-agent /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
  listen 443 ssl http2;
  server_name notgonnalieplz.site www.notgonnalieplz.site;

  # 按实际证书路径填写（你当前证书文件名：notgonnalieplz.site_bundle.crt / notgonnalieplz.site.key）
  ssl_certificate     /etc/nginx/ssl/notgonnalieplz.site_bundle.crt;
  ssl_certificate_key /etc/nginx/ssl/notgonnalieplz.site.key;

  root /var/www/ai-agent/desktop;
  index index.html;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location /api/ {
    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

server {
  listen 80;
  server_name notgonnalieplz.site www.notgonnalieplz.site;
  return 301 https://$host$request_uri;
}
