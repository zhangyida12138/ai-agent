name: CI-CD-Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1 # 与你服务器版本保持一致

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm' # 自动缓存 node_modules

      - name: Enable pnpm from packageManager
        run: |
          corepack enable
          corepack prepare pnpm@10.15.1 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prod=false

      - name: Build all packages
        run: pnpm -r build

      - name: Typecheck (non-blocking)
        run: pnpm -r typecheck || true

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          set -e
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy over native SSH
        run: |
          set -e
          ssh -i ~/.ssh/id_ed25519 -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << 'EOF'
          set -e

          echo "[deploy] cd to project"
          cd "${{ secrets.DEPLOY_PATH }}"

          echo "[deploy] sync code"
          git fetch --all
          git reset --hard origin/main

          echo "[deploy] install and build"
          sudo corepack enable
          sudo corepack prepare pnpm@10.15.1 --activate
          sudo pnpm --version
          sudo HUSKY=0 pnpm install --frozen-lockfile --prod=true --force
          sudo HUSKY=0 pnpm  build

          echo "[deploy] update frontend static files"
          sudo mkdir -p /var/www/ai-agent
          sudo rm -rf /var/www/ai-agent/*
          sudo cp -r apps/desktop/dist/* /var/www/ai-agent/

          echo "[deploy] reload sidecar"
          sudo pm2 restart ai-agent || pm2 start "pnpm --filter @ai-agent/sidecar start" --name ai-agent
          pm2 save

          echo "[deploy] apply nginx config from repo"
          sudo cp deploy/nginx/ai-agent.conf /etc/nginx/sites-available/ai-agent.conf
          sudo ln -sf /etc/nginx/sites-available/ai-agent.conf /etc/nginx/sites-enabled/ai-agent.conf
          sudo nginx -t
          sudo systemctl reload nginx

          echo "[deploy] done"
          EOF
