name: 自动部署到腾讯云

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 连接服务器并自动部署
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            # 拉最新代码
            git pull origin main
            
            # 停止旧容器
            sudo docker stop next-ai-bot || true
            sudo docker rm next-ai-bot || true
            sudo docker rmi next-ai-image || true
            
            # 构建并启动
            sudo docker build -t next-ai-image .
            sudo docker run -d \
              --name next-ai-bot \
              --restart always \
              -p 3000:3000 \
              --env-file .env \
              next-ai-image
