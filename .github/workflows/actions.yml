name: 自动部署到腾讯云

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 安装 SSH 工具（原生自带，无需第三方 Action）
      - name: Install SSH
        run: sudo apt-get install -y openssh-client

      # 写入服务器密钥 → 自动登录部署
      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts

          # 远程执行部署命令
          sshpass -p $SERVER_PASSWORD ssh $SERVER_USER@$SERVER_HOST "
            set -e
            cd $DEPLOY_PATH

            # 拉最新代码
            git pull origin main

            # 重启 Docker
            sudo docker stop AI_AGENT || true
            sudo docker rm AI_AGENT || true
            sudo docker rmi next-ai-image || true

            sudo docker build -t next-ai-image .

            sudo docker run -d \
              --name AI_AGENT \
              --restart always \
              -p 3000:3000 \
              --env-file .env \
              next-ai-image
          "